<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js Model Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>

<div id="canvas-container" style="width: 100vw; height: 100vh;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
  const container = document.getElementById('canvas-container');
  
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x222222);
  
  const camera = new THREE.PerspectiveCamera(
    75, 
    window.innerWidth / window.innerHeight, 
    0.1, 
    1000
  );
  camera.position.z = 5;
  
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  container.appendChild(renderer.domElement);
  
  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5, 5, 5);
  scene.add(light);
  
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
  scene.add(ambientLight);
  
  const loader = new THREE.GLTFLoader();
  let model;
  
  loader.load(
    './Body1.glb',
    (gltf) => {
      model = gltf.scene;
      scene.add(model);
      model.scale.set(1, 1, 1);
      console.log('Model loaded!');
    },
    (progress) => {
      console.log(Math.round((progress.loaded / progress.total) * 100) + '%');
    },
    (error) => {
      console.error('Error:', error);
    }
  );
  
  function animate() {
    requestAnimationFrame(animate);
    if (model) {
      model.rotation.x += 0.003;
      model.rotation.y += 0.005;
    }
    renderer.render(scene, camera);
  }
  animate();
  
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

</body>
</html>
